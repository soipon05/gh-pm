version: 2

project_name: gh-pm

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: gh-pm
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - # gh extension install が認識する命名規則:
    # macOS/Linux: {name}_{os}_{arch}.tar.gz
    # Windows:     {name}_{os}_{arch}.zip
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - none*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
