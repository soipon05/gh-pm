version: 2

project_name: gh-pm

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: gh-pm
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - # gh extension install は strings.HasSuffix でアセット名をチェックする
    # → アーカイブ不可。生バイナリ名が "{name}-{os}-{arch}" で終わる必要がある
    # Windows のみ ".exe" 付きで別途対応
    format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
